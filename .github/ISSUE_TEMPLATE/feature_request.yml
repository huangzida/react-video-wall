name: 特性建议
description: 提一个新特性或改进想法
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提议！请说明你想解决什么问题，以及你设想的方案。

  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 你遇到了什么痛点？现状有什么不便？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 设想的方案
      description: 你希望它怎么工作？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 有没有别的做法？为什么觉得本方案更好？

  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      multiple: true
      options:
        - 构建产物
        - 测试 / CI 矩阵
        - 代码检查 / 格式化
        - 发布流程
        - 文档 / ADR
        - 模板脚手架本身
